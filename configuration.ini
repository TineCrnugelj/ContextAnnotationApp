# ============================================================
# TIMO Robot — configuration.ini
# Upload this file via "System Configuration & Status"
# Lines starting with # or ; are comments. Section headers
# in [brackets] are ignored (kept only for readability).
# ============================================================

[mqtt]
# MQTT broker over WebSocket (use ws:// or set use_tls=true for wss://)
broker_url = wss://hassio.lucami.org
port       = 8884
topic      = timo/actions
use_tls    = true
username   = lovablemqtt
password   = LucamiMQTT2026*

[app]
# UI / speech language: en | sl
language        = en
# Communication mode: text | speech | both
comm_mode       = both
# Speech-to-text provider: browser | ai
stt_provider    = browser
# Text-to-speech provider: browser | ai
tts_provider    = browser
# Folder (served path) where emotion_01.png .. emotion_13.png live
emoticon_directory = /emoticons
# Verbose logging
debug           = true
# Log file
log_file = false
# Audio clips (pre-recorded MP3s, override TTS for matching action_id)
audio_clips_directory = /audio
prefer_audio_clips = true
# TTS engine (browser = current Web Speech API, azure = coming soon)
tts_engine = browser

# How the MQTT "control"/"say" command is handled:
#   direct = speak params.text immediately via TTS (fastest, ~100ms)
#   llm    = send params.text as a prompt to the chat LLM, speak the reply (slower, ~1-3s)
say_mode        = direct

[recording]
# Capture device sensors while Run is active
record_sensors  = false
# Capture camera video while Run is active
record_video    = false

[external_supabase]
# Use your own Supabase project for storing recordings instead of the built-in one
external_supabase_enabled  = false
external_supabase_url      =
external_supabase_anon_key =
